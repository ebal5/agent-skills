name: check-upstreams

on:
  schedule:
    - cron: "0 21 * * SUN"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install ruamel.yaml
        run: pip install ruamel.yaml

      - name: Check upstream skill updates
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/check_upstreams.py

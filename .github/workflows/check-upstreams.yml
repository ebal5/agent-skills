# Requires repo Actions settings to allow PR creation by GITHUB_TOKEN:
#   gh api -X PUT repos/<owner>/<repo>/actions/permissions/workflow \
#     -F can_approve_pull_request_reviews=true
# Without this, `gh pr create` inside scripts/check_upstreams.py fails.
name: check-upstreams

on:
  schedule:
    - cron: "0 21 * * SUN"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install ruamel.yaml
        run: pip install ruamel.yaml

      - name: Check upstream skill updates
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/check_upstreams.py
